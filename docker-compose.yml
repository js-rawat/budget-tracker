version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: budget-tracker-postgres
    environment:
      POSTGRES_DB: budgettracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - budget-tracker-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./budget-tracker-backend
      dockerfile: Dockerfile
    container_name: budget-tracker-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/budgettracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    networks:
      - budget-tracker-network

  # React Frontend
  frontend:
    build:
      context: ./budget-tracker-frontend
      dockerfile: Dockerfile
    container_name: budget-tracker-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - budget-tracker-network

networks:
  budget-tracker-network:
    driver: bridge

volumes:
  postgres-data: