# Development environment properties

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/budget_tracker
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.budgettracker=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO

# File storage (for receipt uploads)
file.upload-dir=./uploads/receipts

# OAuth2 configuration (replace with actual values for development)
spring.security.oauth2.client.registration.google.client-id=your-dev-client-id
spring.security.oauth2.client.registration.google.client-secret=your-dev-client-secret
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT configuration
jwt.secret=devSecretKeyForJwtSigningAndVerificationDevEnvironmentOnly
jwt.expiration=86400000